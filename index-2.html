var SHEET_ID = '1LiBaA6pLDeODFVvHIIV8SaFxJqeRcickmjKDa4eSiuA';
var CSV_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=0';

var allEvents = [];
var currentFilter = 'all';
var currentSearch = '';

function getCode(pais) {
  pais = pais || '';
  if (pais.indexOf('Espa') > -1) return 'es';
  if (pais.indexOf('Indonesia') > -1) return 'id';
  if (pais.indexOf('Colombia') > -1) return 'col';
  if (pais.indexOf('xico') > -1) return 'mx';
  return 'doc';
}
function getFlag(code) {
  return {es:'🇪🇸',id:'🇮🇩',col:'🇨🇴',mx:'🇲🇽',doc:'🌐'}[code]||'🌐';
}
function getLabel(code) {
  return {es:'España',id:'Indonesia',col:'Colombia',mx:'México',doc:'General'}[code]||code;
}
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function sortByDate(a,b) {
  if (!a.fecha && !b.fecha) return 0;
  if (!a.fecha) return 1;
  if (!b.fecha) return -1;
  var pa=a.fecha.split('/'), pb=b.fecha.split('/');
  var da=(pa[2]||'')+(pa[1]||'')+(pa[0]||'');
  var db=(pb[2]||'')+(pb[1]||'')+(pb[0]||'');
  return da.localeCompare(db);
}

function makeCardLink(enlace) {
  // limpia espacios y caracteres raros
  var url = String(enlace||'').trim().replace(/[\r\n\t]/g,'');
  if (!url || url.indexOf('http') !== 0) return '';
  return '<a class="card-link" href="' + url + '" target="_blank" rel="noopener noreferrer">' +
    '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
    '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>' +
    '<polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
    'Ver Documento</a>';
}

function render() {
  var q = currentSearch.toLowerCase();
  var filtered = allEvents.filter(function(e) {
    var mf = currentFilter === 'all' || e.code === currentFilter;
    var ms = !q ||
      (e.titulo||'').toLowerCase().indexOf(q) > -1 ||
      (e.sintesis||'').toLowerCase().indexOf(q) > -1;
    return mf && ms;
  });

  document.getElementById('hdr-count').textContent = allEvents.length + ' documentos registrados';
  document.getElementById('ctrl-count').textContent = filtered.length + ' / ' + allEvents.length;

  if (filtered.length === 0) {
    document.getElementById('timeline').innerHTML = '<p class="empty">Sin resultados.</p>';
    return;
  }

  var years = {};
  filtered.forEach(function(e) {
    var parts = (e.fecha||'').split('/');
    var yr = parts[2] || 'Sin fecha';
    if (!years[yr]) years[yr] = [];
    years[yr].push(e);
  });

  var yrKeys = Object.keys(years).sort(function(a,b){
    if(a==='Sin fecha') return 1;
    if(b==='Sin fecha') return -1;
    return a.localeCompare(b);
  });

  var html = '';
  yrKeys.forEach(function(yr) {
    html += '<div class="year-label">' + yr + '</div>';
    years[yr].forEach(function(e) {
      html += '<div class="card">' +
        '<div class="card-meta">' +
          (e.fecha ? '<span class="card-date">' + escH(e.fecha) + '</span>' : '') +
          '<span class="badge badge-' + e.code + '">' + getFlag(e.code) + ' ' + getLabel(e.code) + '</span>' +
        '</div>' +
        '<h3>' + escH(e.titulo) + '</h3>' +
        (e.sintesis ? '<p>' + escH(e.sintesis) + '</p>' : '') +
        makeCardLink(e.enlace) +
      '</div>';
    });
  });

  document.getElementById('timeline').innerHTML = html;
}

// Parsear CSV robusto
function parseCSV(text) {
  var result = [];
  var lines = text.split('\n');
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var cols = [];
    var cur = '';
    var inQ = false;
    for (var j = 0; j < line.length; j++) {
      var ch = line[j];
      if (ch === '"') {
        if (inQ && line[j+1] === '"') { cur += '"'; j++; }
        else { inQ = !inQ; }
      } else if (ch === ',' && !inQ) {
        cols.push(cur.trim());
        cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur.trim());
    if (cols[0] && cols[0] !== 'Fecha') result.push(cols);
  }
  return result;
}

function loadFromSheet() {
  fetch(CSV_URL)
    .then(function(r) {
      if (!r.ok) throw new Error('no access');
      return r.text();
    })
    .then(function(text) {
      var rows = parseCSV(text);
      if (rows.length > 0) {
        var fresh = rows.map(function(r) {
          var pais = r[1] || '';
          var code = getCode(pais);
          var titulo = (r[2]||'').replace(/^\d+\.\s*/,'').trim();
          var enlace = (r[4]||'').trim();
          return {fecha:(r[0]||'').trim(), pais:pais, code:code, titulo:titulo, sintesis:(r[3]||'').trim(), enlace:enlace};
        }).filter(function(e){ return e.titulo; });
        fresh.sort(sortByDate);
        allEvents = fresh;
        render();
      }
    })
    .catch(function(err) {
      console.log('Sheet no disponible, usando datos base:', err.message);
    });
}
